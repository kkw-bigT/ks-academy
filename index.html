<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS EDU GROUP - 강의 영상</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;min-height:100vh}
.header-top{background:white;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e0e0e0}
.header-top img{width:52px;height:52px;border-radius:50%}
.header-top-right{text-align:right;align-self:flex-end;padding-bottom:2px}
.header-top-right h1{font-size:1.45rem;font-weight:900;color:#1a2744;letter-spacing:1px;font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;-webkit-text-stroke:0.5px #1a2744}
.header-top-right p{font-size:0.72rem;color:#888;letter-spacing:1px;margin-top:5px}
.header-banner{background:#1a2744;padding:22px 20px;display:flex;align-items:flex-end;justify-content:space-between}
.header-banner-left span{display:block;font-size:1.0rem;color:rgba(255,255,255,0.6);letter-spacing:2px}
.header-banner-left strong{display:block;font-size:1.38rem;font-weight:700;color:white}
.header-banner-right{text-align:right}
.since2010{color:rgba(255,255,255,0.6);font-weight:700;font-size:0.95rem;letter-spacing:2px;display:inline-block}
.since2010::before{content:'';display:block;height:3px;background:#c0392b;margin-bottom:4px;border-radius:2px}
.header-banner-right .slogan{color:white;font-weight:700;font-size:0.95rem;position:relative;display:inline-block}
.header-banner-right .slogan::after{content:'';display:block;height:3px;background:#c0392b;margin-top:3px}
.header-user{font-size:0.85rem;color:rgba(255,255,255,0.8)}
.container{max-width:900px;margin:0 auto;padding:20px}
.card{background:white;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:16px}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:600;transition:all 0.2s}
.btn-primary{background:#1a2744;color:white}
.btn-primary:hover{background:#2c3e6b}
.btn-danger{background:#c0392b;color:white}
.btn-danger:hover{background:#a93226}
.btn-success{background:#27ae60;color:white}
.btn-success:hover{background:#219a52}
.btn-gray{background:#95a5a6;color:white}
.btn-sm{padding:6px 12px;font-size:0.8rem}
.input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:0.95rem;outline:none;transition:border-color 0.2s}
.input:focus{border-color:#1a2744}
.label{display:block;margin-bottom:6px;font-weight:600;color:#333;font-size:0.9rem}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;background:#f0f2f5;padding:4px;border-radius:10px}
.tab{flex:1;padding:10px;text-align:center;border:none;background:transparent;cursor:pointer;border-radius:8px;font-weight:600;color:#666;transition:all 0.2s;outline:none}
.tab.active{background:transparent;color:#1a2744;box-shadow:none;outline:none}
.subject-tabs{display:flex;gap:8px;margin-bottom:16px}
.subject-tab{padding:10px 24px;border:2px solid #1a2744;background:white;color:#1a2744;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.95rem;transition:all 0.2s;outline:none}
.subject-tab.active{background:white;color:#1a2744;border:2px solid #1a2744;outline:none}
.grade-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.grade-pill{padding:6px 16px;border:1.5px solid #ccc;background:white;border-radius:20px;cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.grade-pill.active{border-color:#1a2744;background:#1a2744;color:white}
.lecture-card{border:1.5px solid #e8eaf0;border-radius:10px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s}
.lecture-card:hover{border-color:#1a2744;box-shadow:0 2px 8px rgba(26,39,68,0.1)}
.lecture-card.completed{background:#f0fff4;border-color:#27ae60}
.lecture-info{flex:1}
.lecture-title{font-weight:700;color:#1a2744;margin-bottom:4px}
.lecture-meta{font-size:0.8rem;color:#888}
.complete-badge{background:#27ae60;color:white;padding:3px 10px;border-radius:12px;font-size:0.75rem;font-weight:700}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:white;border-radius:16px;width:90%;max-width:750px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.modal-header{background:#1a2744;color:white;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:0}
.video-container{position:relative;padding-bottom:56.25%;height:0}
.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%}
.modal-footer{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;background:#f8f9fa}
.alert{padding:12px 16px;border-radius:8px;margin-bottom:12px;font-size:0.9rem}
.alert-error{background:#fdecea;color:#c0392b;border:1px solid #f5b7b1}
.alert-success{background:#d4efdf;color:#1e8449;border:1px solid #a9dfbf}
.select{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:0.95rem;outline:none;background:white}
.select:focus{border-color:#1a2744}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:14px}
.search-box{display:flex;gap:8px;margin-bottom:16px}
.empty{text-align:center;padding:40px;color:#aaa}
.student-row{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #f0f0f0}
.progress-bar{height:6px;background:#e0e0e0;border-radius:3px;flex:1;margin:0 12px}
.progress-fill{height:100%;background:#27ae60;border-radius:3px;transition:width 0.3s}
.close-btn{background:none;border:none;color:white;font-size:1.5rem;cursor:pointer;line-height:1}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a2744}
.login-card{background:white;border-radius:20px;padding:40px;width:90%;max-width:420px;box-shadow:0 4px 20px rgba(0,0,0,0.08);border:1.5px solid #e0e0e0}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{width:80px;height:80px;border-radius:50%}
.login-title{text-align:center;color:#1a2744;font-size:1.3rem;font-weight:900;margin-bottom:4px}
.login-sub{text-align:center;color:#888;font-size:0.85rem;margin-bottom:28px}
.edit-btns{display:flex;gap:6px}
.app-footer{text-align:center;padding:32px 0 24px;}
.app-footer-brand{font-size:0.8rem;color:#aaa;letter-spacing:2px;margin-bottom:4px}
.app-footer-slogan{font-size:1.1rem;font-weight:900;color:#c0392b;letter-spacing:1px}
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
.confetti-emoji{font-size:3rem;animation:popIn 0.4s ease-out forwards}
.confetti-text{font-size:1.5rem;font-weight:900;color:#27ae60;animation:popIn 0.4s 0.1s ease-out both}
.confetti-sub{font-size:0.9rem;color:#555;animation:popIn 0.4s 0.2s ease-out both}
.confetti-particles{position:absolute;width:100%;height:100%}
.confetti-p{position:absolute;width:8px;height:8px;border-radius:50%;animation:fall 1.5s ease-in forwards}
@keyframes popIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.notice-bar{background:white;border:none;border-bottom:3px solid #c0392b;border-radius:8px 8px 0 0;color:#222;padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:0.92rem;margin-bottom:4px}
.notice-bar-icon{flex-shrink:0;display:flex;align-items:center}
.notice-bar-text{flex:1;color:#333;font-weight:500}
</style>

function extractYouTubeId(input) {
  const s = input.trim();
  // youtu.be/ID
  const m1 = s.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
  if (m1) return m1[1];
  // youtube.com/watch?v=ID
  const m2 = s.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
  if (m2) return m2[1];
  // youtube.com/shorts/ID
  const m3 = s.match(/shorts\/([a-zA-Z0-9_-]{11})/);
  if (m3) return m3[1];
  // already just an ID (11 chars)
  if (/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;
  return s;
}

async function loginStudent(name, attendNum) {
  const q = await db.collection('students')
    .where('name','==',name).where('attendNum','==',attendNum).get();
  if (!q.empty) return { id: q.docs[0].id, ...q.docs[0].data() };
  const ref = await db.collection('students').add({ name, attendNum, createdAt: new Date() });
  return { id: ref.id, name, attendNum };
}
async function getLectures() {
  const snap = await db.collection('lectures').get();
  const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  return docs.sort((a, b) => {
    if (a.subject !== b.subject) return a.subject.localeCompare(b.subject);
    if (a.grade !== b.grade) return a.grade.localeCompare(b.grade);
    return String(a.page).localeCompare(String(b.page), undefined, {numeric: true});
  });
}
async function addLecture(data) { return await db.collection('lectures').add({ ...data, createdAt: new Date() }); }
async function updateLecture(id, data) { return await db.collection('lectures').doc(id).update(data); }
async function deleteLecture(id) { return await db.collection('lectures').doc(id).delete(); }
async function getStudentCompletions(studentId) {
  const snap = await db.collection('completions').where('studentId','==',studentId).get();
  return snap.docs.map(d => ({ lectureId: d.data().lectureId, completedAt: d.data().completedAt }));
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
async function getNotice() {
  try {
    const doc = await db.collection('settings').doc('notice').get();
    if (doc.exists) return doc.data().text || '';
    return '';
  } catch(e) { return ''; }
}

async function setNotice(text) {
  await db.collection('settings').doc('notice').set({ text, updatedAt: new Date() });
}

async function getHomework(studentId) {
  const snap = await db.collection('homework').where('studentId','==',studentId).get();
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function getAllHomework() {
  const snap = await db.collection('homework').get();
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function assignHomework(studentId, lectureId, dueDate, note) {
  await db.collection('homework').add({studentId, lectureId, dueDate, note, assignedAt: new Date()});
}

async function deleteHomework(id) {
  await db.collection('homework').doc(id).delete();
}

    .where('studentId','==',studentId).where('lectureId','==',lectureId).get();
  const data = {
    studentId, lectureId,
    completedAt: new Date(),
    startedAt: playData?.startedAt || null,
    playSeconds: playData?.playSeconds || 0,
    totalSeconds: playData?.totalSeconds || 0
  };
  if (q.empty) await db.collection('completions').add(data);
}
async function getAllStudents() {
  const snap = await db.collection('students').orderBy('attendNum').get();
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function getAllCompletions() {
  const snap = await db.collection('completions').get();
  return snap.docs.map(d => d.data());
}

function LectureForm({ initial, onSave, onCancel }) {
  const [subject, setSubject] = useState(initial?.subject || '수학');
  const [grade, setGrade] = useState(initial?.grade || GRADES['수학'][0]);
  const [textbook, setTextbook] = useState(initial?.textbook || '');
  const [page, setPage] = useState(initial?.page || '');
  const [title, setTitle] = useState(initial?.title || '');
  const [youtubeId, setYoutubeId] = useState(initial?.youtubeId || '');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [existingTextbooks, setExistingTextbooks] = useState([]);

  useEffect(()=>{
    db.collection('lectures').get().then(snap=>{
      const books = [...new Set(snap.docs.map(d=>d.data().textbook).filter(Boolean))].sort();
      setExistingTextbooks(books);
    });
  },[]);

  function handleSubjectChange(s) { setSubject(s); setGrade(GRADES[s][0]); }

  async function handleSubmit(e) {
    e.preventDefault();
    if (!textbook.trim()||!page.trim()||!title.trim()||!youtubeId.trim()) { setError('모든 항목을 입력해주세요'); return; }
    setLoading(true); setError('');
    try {
      await onSave({ subject, grade, textbook:textbook.trim(), page:page.trim(), title:title.trim(), youtubeId:youtubeId.trim() });

        <div className="form-group"><label className="label">학년/단계</label>
          <select className="select" value={grade} onChange={e=>setGrade(e.target.value)}>
            {GRADES[subject].map(g=><option key={g}>{g}</option>)}

      </div>

      <div className="form-group"><label className="label">문제번호</label><input className="input" value={title} onChange={e=>setTitle(e.target.value)} placeholder="문제번호 입력 (예: 3-2번)" /></div>
      <div className="form-group"><label className="label">YouTube ID</label>
        <input className="input" value={youtubeId} onChange={e=>setYoutubeId(extractYouTubeId(e.target.value))} placeholder="URL 또는 ID 입력" />
        <div style={{fontSize:'0.78rem',color:'#888',marginTop:4}}>유튜브 URL 전체 붙여넣기 OK — ID 자동 추출</div>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button type="button" className="btn btn-gray" onClick={onCancel}>취소</button>
        <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? <span className="spinner"/> : '저장'}</button>
      </div>
    </form>
  );

    const rows = [['학생이름','출결번호','과목','학년','교재','페이지','문제번호','완강일시','시청시간(초)']];

                    <div style={{display:'flex',gap:6}}>
                      {Object.keys(GRADES).map(s=>(
                        <button key={s} className={"subject-tab"+(hwSubject===s?' active':'')} style={{flex:1,padding:'8px'}} onClick={()=>{setHwSubject(s);setHwGrade('');setHwTextbook('');}}>{s}</button>
                      ))}
                    </div>
                    <select className="select" value={hwGrade} onChange={e=>{setHwGrade(e.target.value);setHwTextbook('');}}>
                      <option value=''>학년 선택</option>
                      {hwGrades.map(g=><option key={g} value={g}>{g}</option>)}
                    </select>
                    <select className="select" value={hwTextbook} onChange={e=>setHwTextbook(e.target.value)}>
                      <option value=''>교재 선택</option>
                      {hwTextbooks.map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                      <input className="input" type="number" value={hwPageFrom} onChange={e=>setHwPageFrom(e.target.value)} placeholder="시작 페이지" style={{flex:1}}/>
                      <span style={{color:'#888',flexShrink:0}}>~</span>
                      <input className="input" type="number" value={hwPageTo} onChange={e=>setHwPageTo(e.target.value)} placeholder="끝 페이지" style={{flex:1}}/>
                    </div>
                    <div style={{fontSize:'0.82rem',color:'#888',padding:'2px 4px'}}>선택된 강의: <strong style={{color:'#1a2744'}}>{matchedLectures.length}개</strong></div>
                    <input className="input" type="date" value={hwDue} onChange={e=>setHwDue(e.target.value)}/>
                    <input className="input" value={hwNote} onChange={e=>setHwNote(e.target.value)} placeholder="메모 (예: 이번 주까지)"/>
                    <button className="btn btn-primary" disabled={!hwStudent||matchedLectures.length===0} onClick={async()=>{
                      await Promise.all(matchedLectures.map(l=>assignHomework(hwStudent, l.id, hwDue, hwNote)));
                      setHwStudent(''); setHwGrade(''); setHwTextbook(''); setHwPageFrom(''); setHwPageTo(''); setHwDue(''); setHwNote('');
                      setMsg(`숙제 ${matchedLectures.length}개 지정 완료`); setTimeout(()=>setMsg(''),3000); loadAll();
                    }}>숙제 지정</button>
                  </div>
                );
              })()}
            </div>
            <div className="card" style={{padding:0,overflow:'hidden'}}>
              <div style={{padding:'12px 16px',borderBottom:'1px solid #f0f0f0',fontWeight:700,color:'#1a2744'}}>현재 숙제 목록</div>
              {homework.length===0 ? <div className="empty">지정된 숙제가 없습니다</div> :
               homework.map(hw=>{
                 const s = students.find(x=>x.id===hw.studentId);
                 const l = lectures.find(x=>x.id===hw.lectureId);
                 if(!s||!l) return null;
                 return (
                   <div key={hw.id} style={{display:'flex',alignItems:'center',padding:'12px 16px',borderBottom:'1px solid #f0f0f0',gap:12}}>
                     <div style={{flex:1}}>
                       <div style={{fontWeight:700,fontSize:'0.9rem'}}>{s.name} <span style={{color:'#888',fontWeight:400}}>({s.attendNum}번)</span></div>
                       <div style={{fontSize:'0.82rem',color:'#555'}}>{l.textbook} {l.page}p — {l.title}</div>
                       {hw.dueDate && <div style={{fontSize:'0.78rem',color:'#c0392b'}}>마감: {new Date(hw.dueDate).toLocaleDateString('ko-KR')}</div>}
                       {hw.note && <div style={{fontSize:'0.78rem',color:'#888'}}>{hw.note}</div>}
                     </div>
                     <button className="btn btn-danger btn-sm" onClick={async()=>{await deleteHomework(hw.id); loadAll();}}>삭제</button>
                   </div>
                 );
               })}
            </div>
          </div>
        )}

      </div>
      <div className="app-footer">
        <div className="app-footer-brand">KS EDU GROUP</div>
        <div className="app-footer-slogan">관리가 답이다!</div>
      </div>
    </div>
  );
}

function CelebrationOverlay({ onDone }) {
  const particles = Array.from({length:20},(_,i)=>({
    left: Math.random()*100+'%',
    top: Math.random()*30+'%',
    delay: Math.random()*0.8+'s',
    color: ['#27ae60','#f39c12','#e74c3c','#3498db','#9b59b6','#1a2744'][Math.floor(Math.random()*6)]
  }));
  React.useEffect(()=>{ const t=setTimeout(onDone,2200); return ()=>clearTimeout(t); },[]);
  return (
    <div className="confetti-wrap">
      <div className="confetti-particles">
        {particles.map((p,i)=>(
          <div key={i} className="confetti-p" style={{left:p.left,top:p.top,background:p.color,animationDelay:p.delay}}/>
        ))}
      </div>
      <div className="confetti-emoji">🎉</div>
      <div className="confetti-text">완강!</div>
      <div className="confetti-sub">잘했어요! 계속 화이팅 💪</div>
    </div>
  );
}

function VideoModal({ lecture, completed, onComplete, onClose }) {
  const [marking, setMarking] = useState(false);
  const [done, setDone] = useState(completed);
  const [celebrating, setCelebrating] = useState(false);
  const startedAt = React.useRef(new Date());

  async function handleComplete() {
    setMarking(true);
    const playSeconds = Math.round((new Date() - startedAt.current) / 1000);
    const playData = { startedAt: startedAt.current, playSeconds, totalSeconds: 0 };
    await onComplete(lecture.id, playData);
    setDone(true); setMarking(false); setCelebrating(true);
  }

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      {celebrating && <CelebrationOverlay onDone={()=>setCelebrating(false)}/>}
      <div className="modal">
        <div className="modal-header">
          <span style={{fontWeight:700}}>{lecture.title}</span>
          <button className="close-btn" onClick={onClose}>x</button>
        </div>
        <div className="modal-body">
          <div className="video-container">
            <iframe
              src={"https://www.youtube.com/embed/"+lecture.youtubeId.trim()+"?rel=0&autoplay=1"}
              frameBorder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowFullScreen
            />
          </div>
        </div>
        <div className="modal-footer">
          <div style={{fontSize:'0.85rem',color:'#666'}}>{lecture.subject} | {lecture.grade} | {lecture.textbook} | {lecture.page}p</div>
          {done ? <span className="complete-badge">완강 ✓</span> :
           <button className="btn btn-success" onClick={handleComplete} disabled={marking}>{marking?<span className="spinner"/>:'완강 체크'}</button>}
        </div>
      </div>
    </div>
  );
}


function StudentDashboard({ student, onLogout }) {
  const [lectures, setLectures] = useState([]);
  const [completions, setCompletions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [subject, setSubject] = useState('수학');
  const [grade, setGrade] = useState(null);
  const [textbook, setTextbook] = useState('');
  const [pageSearch, setPageSearch] = useState('');
  const [selectedLecture, setSelectedLecture] = useState(null);
  const [notice, setNoticeText] = useState('');
  const [studentTab, setStudentTab] = useState('강의');
  const [homework, setHomework] = useState([]);

  useEffect(()=>{ loadData(); },[]);

  async function loadData() {
    setLoading(true);
    const [l,c,n,hw] = await Promise.all([getLectures(), getStudentCompletions(student.id), getNotice(), getHomework(student.id)]);
    setLectures(l); setCompletions(c); setNoticeText(n); setHomework(hw); setLoading(false);  // c = [{lectureId, completedAt}]

  }

  function handleSubject(s) {
    setSubject(s); setGrade(null); setTextbook(''); setPageSearch('');
  }
  function handleGrade(g) {
    setGrade(g); setTextbook(''); setPageSearch('');
    if(!g) return;
    const filtered = lectures.filter(x=>x.subject===subject&&x.grade===g);
    const books = [...new Set(filtered.map(x=>x.textbook))];
    if (books.length>0) setTextbook(books[0]);
  }

  const filteredBySubjectGrade = lectures.filter(l=>l.subject===subject&&l.grade===grade);
  const textbooks = [...new Set(filteredBySubjectGrade.map(l=>l.textbook))];
  const displayed = filteredBySubjectGrade.filter(l=>{
    if (textbook&&l.textbook!==textbook) return false;
    if (pageSearch&&!l.page.includes(pageSearch)) return false;
    return true;
  });

  async function handleComplete(lectureId, playData) {
    await markComplete(student.id, lectureId, playData);
    const completedAt = firebase.firestore.Timestamp.now();
    setCompletions(prev=>[...prev.filter(c=>c.lectureId!==lectureId), {lectureId, completedAt, playData}]);
  }

  const doneCount = completions.length; // completions = [{lectureId,completedAt}]
  const totalCount = lectures.length;

  return (
    <div>
      <Header user={student} onLogout={onLogout}/>
      <div className="container">
        {notice && (
          <div className="notice-bar">
            <span className="notice-bar-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c0392b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 17v5M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg></span>
            <span className="notice-bar-text">{notice}</span>
          </div>
        )}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 4px 4px'}}>
          <span style={{color:'#888',fontSize:'1rem'}}>최근 완강 <strong style={{color:'#27ae60'}}>{doneCount}개</strong></span>
          <span style={{color:'#bbb',fontSize:'0.9rem'}}>{student.name} 학생</span>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button className={"subject-tab"+(studentTab==='강의'?' active':'')} style={{flex:1}} onClick={()=>setStudentTab('강의')}>강의 보기</button>
          <button className={"subject-tab"+(studentTab==='숙제'?' active':'')} style={{flex:1,position:'relative'}} onClick={()=>setStudentTab('숙제')}>
            숙제
            {homework.filter(h=>!completions.find(c=>c.lectureId===h.lectureId)).length>0 && (
              <span style={{position:'absolute',top:-4,right:-4,background:'#c0392b',color:'white',borderRadius:'50%',width:18,height:18,fontSize:'0.7rem',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>
                {homework.filter(h=>!completions.find(c=>c.lectureId===h.lectureId)).length}
              </span>
            )}
          </button>
        </div>

        {studentTab==='숙제' && (
          <div>
            {homework.length===0 ? (
              <div className="empty">지정된 숙제가 없습니다</div>
            ) : homework.map(hw=>{
              const lec = lectures.find(l=>l.id===hw.lectureId);
              if(!lec) return null;
              const isDone = !!completions.find(c=>c.lectureId===hw.lectureId);
              const due = hw.dueDate ? new Date(hw.dueDate) : null;
              const isOverdue = due && !isDone && due < new Date();
              return (
                <div key={hw.id} className="lecture-card" style={{borderColor: isDone?'#27ae60': isOverdue?'#c0392b':'#1a2744', background: isDone?'#f0fff4': isOverdue?'#fff5f5':'white'}}
                  onClick={()=>setSelectedLecture(lec)}>
                  <div className="lecture-info">
                    <div className="lecture-title">{lec.textbook} {lec.page}p — {lec.title}</div>
                    <div className="lecture-meta">{lec.subject} | {lec.grade}{hw.note ? ' | '+hw.note : ''}</div>
                    {due && <div style={{fontSize:'0.78rem',color: isOverdue?'#c0392b':'#888',marginTop:2}}>마감: {due.toLocaleDateString('ko-KR')}{isOverdue?' ⚠️ 기한초과':''}</div>}
                  </div>
                  {isDone ? <span className="complete-badge">완강 ✓</span> : <span style={{color:'#1a2744',fontWeight:700,fontSize:'0.85rem'}}>▶ 보기</span>}
                </div>
              );
            })}
          </div>
        )}

        {studentTab==='강의' && <div className="subject-tabs">
          {Object.keys(GRADES).map(s=>(
            <button key={s} className={"subject-tab"+(subject===s?' active':'')} onClick={()=>handleSubject(s)}>{s}</button>
          ))}
        </div>}

        <div className="grade-pills">
          {grade ? (
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <button className="grade-pill active">{grade}</button>
              <button onClick={()=>handleGrade('')} style={{background:'none',border:'none',color:'#aaa',fontSize:'0.8rem',cursor:'pointer',padding:'2px 6px'}}>✕ 변경</button>
            </div>
          ) : (
            (subject==='수학' ? [['중1','중2','중3'],['공통수학1','공통수학2'],['대수','미적분1','확통','기하']] : [['중1','중2','중3'],['고1','고2','고3']]).map((group,gi)=>(
              <React.Fragment key={gi}>
                {gi>0 && <div style={{width:'100%',height:0}}/>}
                {group.map(g=>(
                  <button key={g} className="grade-pill" onClick={()=>handleGrade(g)}>{g}</button>
                ))}
              </React.Fragment>
            ))
          )}
        </div>

        {textbooks.length>0 && (
          <div style={{marginBottom:16}}>
            <select className="select" value={textbook} onChange={e=>setTextbook(e.target.value)}>
              {textbooks.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
        )}

        <div className="search-box">
          <input className="input" value={pageSearch} onChange={e=>setPageSearch(e.target.value)} placeholder="페이지 번호 검색 (예: 42)"/>
          {pageSearch && <button className="btn btn-gray" onClick={()=>setPageSearch('')}>초기화</button>}
        </div>

        {loading ? <div className="empty">로딩 중...</div> :
         !pageSearch ? <div className="empty">페이지 번호를 검색하세요</div> :
         displayed.length===0 ? <div className="empty">해당 강의가 없습니다</div> :
         displayed.map(l=>{
           const isDone = completions.find(c=>c.lectureId===l.id);
             const doneTime = isDone ? formatDate(isDone.completedAt) : null;
           return (
             <div key={l.id} className={"lecture-card"+(isDone?' completed':'')} onClick={()=>setSelectedLecture(l)}>
               <div style={{fontSize:'1.5rem'}}>{isDone?'✅':'▶️'}</div>
               <div className="lecture-info">
                 <div className="lecture-title">{l.title}</div>
                 <div className="lecture-meta">{l.textbook} | {l.page}p</div>
               </div>
               {isDone && <div style={{textAlign:'right'}}>
                 <span className="complete-badge">완강</span>
                 {doneTime && <div style={{fontSize:'0.72rem',color:'#27ae60',marginTop:3}}>{doneTime}</div>}
               </div>}
             </div>
           );
         })
        }
      </div>
      <div className="app-footer">
        <div className="app-footer-brand">KS EDU GROUP</div>
        <div className="app-footer-slogan">관리가 답이다!</div>
      </div>
      {selectedLecture && (
        <VideoModal lecture={selectedLecture} completed={!!completions.find(c=>c.lectureId===selectedLecture.id)} onComplete={handleComplete} onClose={()=>setSelectedLecture(null)}/>
      )}
    </div>
  );
}

function App() {
  const [view, setView] = useState('login');
  const [student, setStudent] = useState(null);

  return view==='login' ? <LoginPage onLogin={s=>{setStudent(s);setView('student')}} onAdminLogin={()=>setView('admin')}/> :
         view==='admin' ? <AdminDashboard onLogout={()=>setView('login')}/> :
         <StudentDashboard student={student} onLogout={()=>{setStudent(null);setView('login')}}/>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
